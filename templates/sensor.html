<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Page</title>
  <style>
    body{font-family:Inter,system-ui,Arial,sans-serif;margin:0;background:#0b1020;color:#e7ecff}
    .wrap{padding:20px;max-width:1050px;margin:0 auto}
    .links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .links a{color:#cdd8ff;text-decoration:none;border:1px solid #304085;border-radius:9px;padding:8px 12px;background:#121d3e}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card{border:1px solid #2a3965;border-radius:12px;background:#121a33;padding:14px}
    select,input,button{width:100%;padding:10px;border-radius:8px;border:1px solid #3c4f91;background:#0f1730;color:#fff}
    button{border:none;background:linear-gradient(135deg,#3a63ff,#5d7eff);cursor:pointer;font-weight:600}
    .log{white-space:pre-wrap;max-height:300px;overflow:auto;background:#0a1125;border:1px solid #2a3965;border-radius:8px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    @media(max-width:900px){.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="margin:0 0 8px">Re-Route Sensor Page</h1>
    <div class="links"><a href="/">Home</a><a href="/agent-page">Agent</a><a href="/remote">Remote</a><a href="/docs-page">Docs</a></div>

    <div class="row">
      <section class="card">
        <h3 style="margin:0 0 8px">Single Reading</h3>
        <select id="readingSensor"></select>
        <button id="readBtn">GET /sensors/reading/{sensor_id}</button>
        <div id="readingOut" class="log" style="margin-top:8px"></div>
      </section>

      <section class="card">
        <h3 style="margin:0 0 8px">Direct Spike</h3>
        <select id="spikeSensor"></select>
        <input id="spikeValue" type="number" step="0.1" value="6.0" />
        <input id="spikeDuration" type="number" min="1" value="8" />
        <button id="spikeBtn">POST /sensors/spike</button>
        <div id="spikeOut" class="log" style="margin-top:8px"></div>
      </section>
    </div>

    <section class="card" style="margin-top:12px">
      <h3 style="margin:0 0 8px">Configs</h3>
      <div id="configOut" class="log"></div>
    </section>
  </div>

  <script>
    const readingSensor = document.getElementById('readingSensor');
    const spikeSensor = document.getElementById('spikeSensor');

    async function loadConfigs(){
      const res = await fetch('/sensors/configs');
      const cfg = await res.json();
      const options = cfg.map(c => `<option value="${c.sensor_id}">${c.sensor_id} (${c.unit})</option>`).join('');
      readingSensor.innerHTML = options; spikeSensor.innerHTML = options;
      document.getElementById('configOut').textContent = JSON.stringify(cfg, null, 2);
    }

    document.getElementById('readBtn').addEventListener('click', async () => {
      const sensor = readingSensor.value;
      const res = await fetch(`/sensors/reading/${sensor}`);
      document.getElementById('readingOut').textContent = JSON.stringify(await res.json(), null, 2);
    });

    document.getElementById('spikeBtn').addEventListener('click', async () => {
      const payload = {
        sensor_id: spikeSensor.value,
        spike_value: Number(document.getElementById('spikeValue').value),
        duration_seconds: Number(document.getElementById('spikeDuration').value),
      };
      const res = await fetch('/sensors/spike', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
      document.getElementById('spikeOut').textContent = JSON.stringify(await res.json(), null, 2);
    });

    loadConfigs();
  </script>
</body>
</html>
